{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양시 주차 단속 구역 알림</title>
    <link rel="stylesheet" href="{% static 'parking/css/map.css' %}">
</head>
<body>
    <div class="app">
        <div class="menu-bar" id="menu-bar">
            <button type="button" class="menu-bar-item" data-menu="list" title="공영주차장 리스트 검색">공영주차장 리스트</button>
            <button type="button" class="menu-bar-item active" data-menu="area" title="주차 지역 안내">주차지역 안내</button>
            <button type="button" class="menu-bar-item" data-menu="route" title="실시간 예상 시간 안내">실시간 예상 시간</button>
            <button type="button" class="menu-bar-item" data-menu="search" title="주변 주차장 검색">주차장 검색</button>
            <button type="button" class="menu-bar-item" data-menu="fee" title="주차 요금계산기">주차 요금계산기</button>
            <button type="button" class="menu-bar-item" data-menu="report" title="신고하기">신고하기</button>
            <button type="button" class="menu-bar-item" data-menu="report-list" title="신고목록">신고목록</button>
            <a href="{% url 'goyang_stats' %}" class="menu-bar-item" title="통계">통계</a>
        </div>
        <div class="nav-wrap" id="nav-wrap">
            <button type="button" class="nav-close" id="nav-close" title="닫기">✕</button>
            <div class="nav-resize" id="nav-resize" title="드래그하여 너비 조절"></div>
            <button type="button" class="nav-open-tab" id="nav-open-tab">메뉴 열기</button>
            <nav id="nav-bar">
                <div id="nav-content">
                    <div class="empty-state">지도를 클릭하면 해당 위치의 단속 여부와 근처 공영 주차장을 안내합니다.</div>
                </div>
            </nav>

        </div>
        <div id="map-wrap">
            <div id="map"></div>
        </div>
    </div>

    <!-- 포트원 라이브러리 (20260320_양희찬) -->
    <script src="https://cdn.iamport.kr/v1/iamport.js"></script>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_map_js_key }}&libraries=services"></script>
    <script src="{% static 'parking/js/map.js' %}?v=2"></script> <!-- 20260319_양희찬: 캐시 방지용 쿼리스트링 추가 -->
</body>
</html>
